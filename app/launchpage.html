<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
        window['sap-ushell-config'] = {
            defaultRenderer: 'fiori2',
            services: {
                NavTargetResolution: {
                    config: {
                        allowTestUrlComponentConfig: true,
                        enableClientSideTargetResolution: true
                    }
                }
            },
            applications: {

                "leadmanagement-tile": {
                    title: 'Lead Management',
                    description: 'Manage Leads and Customers',
                    icon: "sap-icon://leads",
                    additionalInformation: 'SAPUI5.Component=com.mycompany.leads.leadmanagement',
                    applicationType: 'URL',
                    url: "./lead-management/webapp",
                    navigationMode: 'embedded'
                },

                "salesoffer-tile": {
                    title: 'Sales Offer',
                    description: 'Manage Sales Offers and Proposals',
                    icon: "sap-icon://sales-order",
                    additionalInformation: 'SAPUI5.Component=com.mycompany.salesoffer.salesoffer',
                    applicationType: 'URL',
                    url: "./salesoffer/webapp",
                    navigationMode: 'embedded'
                },

                "activities-tile": {
                    title: 'Activities',
                    description: 'Manage Activities and Scheduling',
                    icon: "sap-icon://activity-items",
                    additionalInformation: 'SAPUI5.Component=com.mycompany.activities.activities',
                    applicationType: 'URL',
                    url: "./activities/webapp",
                    navigationMode: 'embedded'
                },


                "businesspartners-tile": {
                    title: 'Business Partners',
                    description: 'Manage Business Partners',
                    icon: "sap-icon://business-card",
                    additionalInformation: 'SAPUI5.Component=customer.managelead.businesspartners',
                    applicationType: 'URL',
                    url: "./businesspartners/webapp",
                    navigationMode: 'embedded'
                },

                

            }
        }
    </script>

    <script src="https://ui5.sap.com/1.146.0/test-resources/sap/ushell/bootstrap/sandbox.js"></script>
    <script src="https://ui5.sap.com/1.146.0/resources/sap-ui-core.js"
        data-sap-ui-libs="sap.m, sap.ushell, sap.fe.templates"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-bindingSyntax="complex">
    </script>

    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ushell.Container.createRenderer().placeAt('content');
        });
    </script>

</head>

<body class="sapUiBody" id="content"></body>

</html>
